# Source: onlineboutique/templates/loadgenerator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
 # namespace: dev-boutique-app
  labels:
    app: loadgenerator

spec:
  replicas: 2
  selector:
    matchLabels:
      app: loadgenerator

  template:
    metadata:
      labels:
        app: loadgenerator
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"

    spec:
      serviceAccountName: loadgenerator

      terminationGracePeriodSeconds: 5
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: frontend-check
          image: busybox:latest@sha256:e226d6308690dbe282443c8c7e57365c96b5228f0fe7f40731b5d84d37a06839

          command:
            - /bin/sh
            - -exc
            - |
              MAX_RETRIES=12
              RETRY_INTERVAL=10

              for i in $(seq 1 $MAX_RETRIES); do
                echo "Attempt $i: Pinging frontend: ${FRONTEND_ADDR}..."

                STATUSCODE=$(wget --server-response http://${FRONTEND_ADDR} 2>&1 | awk '/^  HTTP/{print $2}')

                if [ $STATUSCODE -eq 200 ]; then
                  echo "Frontend is reachable."
                  exit 0
                fi

                echo "Error: Could not reach frontend - Status code: ${STATUSCODE}"
                sleep $RETRY_INTERVAL
              done

              echo "Failed to reach frontend after $MAX_RETRIES attempts."
              exit 1

          env:
            - name: FRONTEND_ADDR
              value: "frontend:80"

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: main
          image: 389770079035.dkr.ecr.us-east-1.amazonaws.com/11_microservices/loadgeneratorservice@sha256:b2210053e2d3babf643249dcf013bdf2bef27b5240cbe558ac382c7b85299abf

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          env:
            - name: FRONTEND_ADDR
              value: "frontend:80"

            - name: USERS
              value: "10"

            - name: RATE
              value: "1"

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 300m
              memory: 256Mi

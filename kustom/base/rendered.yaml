# Source: onlineboutique/templates/adservice.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: dev-boutique-app
  labels:
    app: adservice
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: adservice
  strategy:
   type: RollingUpdate
   rollingUpdate: 
    maxSurge: 1
    maxUnavailable: 0

  template:
    metadata:
      labels:
        app: adservice
    spec:
      serviceAccountName: adservice

      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true

      containers:
        - name: server
          image: 389770079035.dkr.ecr.us-east-1.amazonaws.com/11_microservices/adservice@sha256:59087efced2b130380a5c92ebf9d609e65f09362441977746962605ba1e6cfaa

          ports:
            - containerPort: 9555

          env:
            - name: PORT
              value: "9555"

          resources:
            limits:
              cpu: 300m
              memory: 300Mi
            requests:
              cpu: 200m
              memory: 180Mi

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          readinessProbe:
            grpc:
              port: 9555
            initialDelaySeconds: 20
            periodSeconds: 15

          livenessProbe:
            grpc:
              port: 9555
            initialDelaySeconds: 20
            periodSeconds: 15

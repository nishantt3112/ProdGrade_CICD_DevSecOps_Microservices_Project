        - name: redis
          image: redis:alpine

          ports:
            - containerPort: 6379

          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}

# Source: onlineboutique/templates/cartservice.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart
  namespace: default

spec:
  selector:
    matchLabels:
      app: redis-cart

  template:
    metadata:
      labels:
        app: redis-cart

    spec:
      serviceAccountName: redis-cart
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true

      containers:
        - name: redis
          image: redis:alpine

          ports:
            - containerPort: 6379

          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}

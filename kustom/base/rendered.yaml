# Source: onlineboutique/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: http-app-route
  #namespace: dev-boutique-app
spec:
  hostnames:
    - longhauler.shop #"app.longhauler.shop"
    - app.longhauler.shop
  parentRefs:
  # - group: gateway.networking.k8s.io
  #   namespace: default
  #   kind: Gateway
  #   name: app-alb-gateway
  #   sectionName: http
  - group: gateway.networking.k8s.io
    namespace: default
    kind: Gateway
    name: app-alb-gateway
    sectionName: https
  rules:
    - matches:  
      - path: 
          type: PathPrefix
          value: /
      backendRefs:
        - name: frontend-stable
          kind: Service
          port: 80
          weight: 100
        - name: frontend-canary
          kind: Service
          port: 80
          weight: 0
---
# Source: onlineboutique/templates/frontend.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  labels:
    app: frontend

spec:
  replicas: 5
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frontend
  strategy:
    canary:
      stableService: frontend-stable
      canaryService: frontend-canary

      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoutes:
              - name: http-app-route
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause: 
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 100
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"

    spec:
      serviceAccountName: frontend
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: server

          image: 389770079035.dkr.ecr.us-east-1.amazonaws.com/11_microservices/frontend@sha256:a136e964b74929ec1acfe7429ec3983e34111249cfbf2f67195b428a83b6a023

          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"

            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"

            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"

            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"

            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"

            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"

            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"

            - name: AD_SERVICE_ADDR
              value: "adservice:9555"

            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice:80"

            - name: ENV_PLATFORM
              value: "aws"

            - name: CYMBAL_BRANDING
              value: "false"

            - name: ENABLE_ASSISTANT
              value: "false"

            - name: ENABLE_SINGLE_SHARED_SESSION
              value: "false"

          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: "shop_session-id=x-readiness-probe"

          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: "shop_session-id=x-liveness-probe"

          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi

        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 100
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"

    spec:
      serviceAccountName: frontend
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: server

          image: 389770079035.dkr.ecr.us-east-1.amazonaws.com/11_microservices/frontend:sha256:28abb1d08305690332333d454de44f449e9dd3b0bf66cb4c920c078d6bb7312d

          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"

            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"

            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"

            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"

            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"

            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"


        runAsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true

      containers:
        - name: server
          image: 389770079035.dkr.ecr.us-east-1.amazonaws.com/11_microservices/adservice:sha256:883e155d0b20336de9bd75d72b58307281df041c93be58963969da0682ac4131


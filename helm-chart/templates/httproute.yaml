apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: http-app-route
  #namespace: dev-boutique-app
spec:
  hostnames:
    - haulerlong.sbs #"app.longhauler.shop"
    - app.haulerlong.sbs
  parentRefs:
  # - group: gateway.networking.k8s.io
  #   namespace: default
  #   kind: Gateway
  #   name: app-alb-gateway
  #   sectionName: http
  - group: gateway.networking.k8s.io
    namespace: default
    kind: Gateway
    name: app-alb-gateway
    sectionName: https
  rules:
    - matches:  
      - path: 
          type: PathPrefix
          value: /
      backendRefs:
        - name: frontend-stable
          kind: Service
          port: 80
          weight: 100
        - name: frontend-canary
          kind: Service
          port: 80
          weight: 0

{{- if .Values.cartService.create }}

{{- if .Values.serviceAccounts.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.serviceAccounts.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.cartService.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.cartService.name }}

  template:
    metadata:
      {{- if .Values.cartDatabase.externalRedisTlsOrigination.enable }}
      annotations:
        sidecar.istio.io/userVolumeMount: >
          [{"name": "{{ .Values.cartDatabase.externalRedisTlsOrigination.name }}",
            "mountPath": "/etc/certs",
            "readonly": true}]
        sidecar.istio.io/userVolume: >
          [{"name": "{{ .Values.cartDatabase.externalRedisTlsOrigination.name }}",
            "secret": {"secretName": "{{ .Values.cartDatabase.externalRedisTlsOrigination.name }}"} }]
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
      {{- end }}

      labels:
        app: {{ .Values.cartService.name }}

    spec:
      serviceAccountName: {{ .Values.cartService.name }}

      terminationGracePeriodSeconds: 5

      {{- if .Values.securityContext.enable }}
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true

        {{- if .Values.seccompProfile.enable }}
        seccompProfile:
          type: {{ .Values.seccompProfile.type }}
        {{- end }}
      {{- end }}

      containers:
        - name: server
          image: {{ .Values.images.cartservice.repository }}:{{ .Values.images.cartservice.tag | default .Chart.AppVersion }}

          ports:
            - containerPort: 7070

          env:
            {{- if eq .Values.cartDatabase.type "spanner" }}
            - name: SPANNER_CONNECTION_STRING
            {{- else }}
            - name: REDIS_ADDR
            {{- end }}
              value: {{ .Values.cartDatabase.connectionString | quote }}

          resources:
            {{- toYaml .Values.cartService.resources | nindent 12 }}

          readinessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 15

          livenessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.cartService.name }}

spec:
  type: ClusterIP
  selector:
    app: {{ .Values.cartService.name }}

  ports:
    - name: grpc
      port: 7070
      targetPort: 7070

{{- if .Values.networkPolicies.create }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}

spec:
  podSelector:
    matchLabels:
      app: {{ .Values.cartService.name }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Values.frontend.name }}
        - podSelector:
            matchLabels:
              app: {{ .Values.checkoutService.name }}
      ports:
        - port: 7070
          protocol: TCP

  egress:
    - {}
{{- end }}

{{- if .Values.sidecars.create }}
---
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}

spec:
  workloadSelector:
    labels:
      app: {{ .Values.cartService.name }}

  egress:
    - hosts:
        - istio-system/*
        {{- if eq .Values.cartDatabase.type "redis" }}
          {{- if .Values.cartDatabase.externalRedisTlsOrigination.enable }}
        - ./{{ .Values.cartDatabase.externalRedisTlsOrigination.name }}.{{ .Release.Namespace }}
          {{- else }}
        - ./{{ .Values.cartDatabase.inClusterRedis.name }}.{{ .Release.Namespace }}.svc.cluster.local
          {{- end }}
        {{- end }}

        {{- if .Values.opentelemetryCollector.create }}
        - ./{{ .Values.opentelemetryCollector.name }}.{{ .Release.Namespace }}.svc.cluster.local
        {{- end }}
{{- end }}

{{- if .Values.authorizationPolicies.create }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.cartService.name }}
  namespace: {{ .Release.Namespace }}

spec:
  selector:
    matchLabels:
      app: {{ .Values.cartService.name }}

  rules:
    - from:
        - source:
            principals:
              {{- if .Values.serviceAccounts.create }}
              - cluster.local/ns/{{ .Release.Namespace }}/sa/{{ .Values.frontend.name }}
              - cluster.local/ns/{{ .Release.Namespace }}/sa/{{ .Values.checkoutService.name }}
              {{- else }}
              - cluster.local/ns/{{ .Release.Namespace }}/sa/default
              {{- end }}

      to:
        - operation:
            paths:
              - /hipstershop.CartService/AddItem
              - /hipstershop.CartService/GetCart
              - /hipstershop.CartService/EmptyCart
            methods:
              - POST
            ports:
              - "7070"
{{- end }}

{{- if .Values.cartDatabase.inClusterRedis.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cartDatabase.inClusterRedis.name }}
  namespace: {{ .Release.Namespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.cartDatabase.inClusterRedis.name }}
  namespace: {{ .Release.Namespace }}

spec:
  selector:
    matchLabels:
      app: {{ .Values.cartDatabase.inClusterRedis.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.cartDatabase.inClusterRedis.name }}

    spec:
      serviceAccountName: {{ .Values.cartDatabase.inClusterRedis.name }}

      {{- if .Values.securityContext.enable }}
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true

        {{- if .Values.seccompProfile.enable }}
        seccompProfile:
          type: {{ .Values.seccompProfile.type }}
        {{- end }}
      {{- end }}

      containers:
        - name: redis
          image: {{ if .Values.cartDatabase.inClusterRedis.publicRepository }}redis:alpine{{ else }}{{ .Values.images.repository }}/redis:alpine{{ end }}

          ports:
            - containerPort: 6379

          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 5

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.cartDatabase.inClusterRedis.name }}
  namespace: {{ .Release.Namespace }}

spec:
  selector:
    app: {{ .Values.cartDatabase.inClusterRedis.name }}

  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}

{{- if .Values.cartDatabase.externalRedisTlsOrigination.enable }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cartDatabase.externalRedisTlsOrigination.name }}
  namespace: {{ .Release.Namespace }}

data:
  {{ .Values.cartDatabase.externalRedisTlsOrigination.name }}.pem: {{ .Values.cartDatabase.externalRedisTlsOrigination.certificate | b64enc | quote }}

---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: {{ .Values.cartDatabase.externalRedisTlsOrigination.name }}
  namespace: {{ .Release.Namespace }}

spec:
  hosts:
    - {{ .Values.cartDatabase.externalRedisTlsOrigination.name }}.{{ .Release.Namespace }}

  addresses:
    - {{ .Values.cartDatabase.externalRedisTlsOrigination.endpointAddress }}/32

  ports:
    - number: {{ .Values.cartDatabase.externalRedisTlsOrigination.endpointPort }}
      name: redis
      protocol: TCP

  location: MESH_EXTERNAL
  resolution: STATIC
{{- end }}

{{- end }}